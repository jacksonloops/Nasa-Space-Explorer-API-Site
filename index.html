<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="header-text">
        <h1>Space Explorer</h1>
        <p class="header-sub">Astronomy Picture of the Day</p>
      </div>
    </header>

    <!-- Random Space Fact -->
    <div id="spaceFact" class="space-fact">
      <span class="fact-label">Did You Know?</span>
      <span id="factText" class="fact-text"></span>
    </div>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchBtn">Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
      <img id="modalImg" class="modal-img" src="" alt="" />
      <div class="modal-body">
        <h2 id="modalTitle" class="modal-title"></h2>
        <span id="modalDate" class="modal-date"></span>
        <p id="modalDesc" class="modal-desc"></p>
        <a id="modalVideo" class="modal-video-link" href="" target="_blank" rel="noopener" style="display:none;">▶ Watch Video</a>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
